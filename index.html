<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#0B0F14;
  --surface:#141A21;
  --surface-2:#1B232C;
  --border:#2A333D;
  --text:#E8E6E1;
  --text-dim:#8B93A0;
  --accent:#C9A15A;
  --accent-dim:#8A7645;
  --win:#4FA98A;
  --loss:#C4574A;
  --be:#7C8896;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  padding:28px 16px 60px;
}
.wrap{max-width:780px;margin:0 auto;}

/* Header */
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.18em;
  color:var(--accent);
  text-transform:uppercase;
  margin:0 0 6px;
}
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;
  margin:0 0 18px;
  letter-spacing:-.01em;
}

.account-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
  border-bottom:1px dashed var(--border);
  padding-bottom:16px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.account-bal label{
  display:block;
  font-size:11px;
  color:var(--text-dim);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.account-bal input{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:22px;
  font-weight:600;
  width:150px;
  padding:2px 0;
}
.account-bal input:focus{outline:none;border-bottom-color:var(--accent);}

.equity-now{
  text-align:right;
}
.equity-now .label{font-size:11px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
.equity-now .val{
  font-family:'JetBrains Mono',monospace;
  font-size:26px;
  font-weight:700;
}

/* Stat strip */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:22px;
}
@media(min-width:600px){.stats{grid-template-columns:repeat(6,1fr);}}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:10px 8px;
  text-align:center;
}
.stat .n{
  font-family:'JetBrains Mono',monospace;
  font-size:17px;
  font-weight:700;
}
.stat .l{
  font-size:9.5px;
  color:var(--text-dim);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-top:2px;
}
.pos{color:var(--win);}
.neg{color:var(--loss);}

/* Log trade button */
.log-btn{
  width:100%;
  background:var(--accent);
  color:#181206;
  border:none;
  border-radius:7px;
  padding:13px;
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  margin-bottom:14px;
  letter-spacing:.01em;
}
.log-btn:hover{background:#d9b06d;}

/* Form */
.form-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  margin-bottom:24px;
  display:none;
}
.form-panel.open{display:block;}
.form-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;
  font-weight:600;
  margin:0 0 4px;
}
.form-sub{
  font-size:12px;
  color:var(--text-dim);
  margin:0 0 16px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media(min-width:520px){.grid.g3{grid-template-columns:repeat(3,1fr);}}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{
  font-size:10.5px;
  color:var(--text-dim);
  letter-spacing:.06em;
  text-transform:uppercase;
}
.field input, .field select, .field textarea{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:13.5px;
  padding:8px 9px;
}
.field textarea{font-family:'Inter',sans-serif;font-size:13px;resize:vertical;min-height:56px;}
.field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--accent);}
.dir-toggle{display:flex;gap:8px;}
.dir-toggle button{
  flex:1;
  padding:9px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
}
.dir-toggle button.active-long{background:rgba(79,169,138,.18);border-color:var(--win);color:var(--win);}
.dir-toggle button.active-short{background:rgba(196,87,74,.18);border-color:var(--loss);color:var(--loss);}

.section-divider{
  font-size:10.5px;
  color:var(--accent-dim);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin:18px 0 10px;
  border-top:1px dashed var(--border);
  padding-top:14px;
}
.shot-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.shot-row input[type=file]{font-size:12px;color:var(--text-dim);}
.shot-preview{
  width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border);
}
.shot-remove{
  background:none;border:1px solid var(--border);color:var(--loss);border-radius:5px;
  font-size:11px;padding:4px 8px;cursor:pointer;
}

.form-actions{display:flex;gap:10px;margin-top:18px;}
.btn-save{
  flex:1;background:var(--accent);color:#181206;border:none;border-radius:7px;
  padding:11px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;
}
.btn-cancel{
  background:transparent;border:1px solid var(--border);color:var(--text-dim);
  border-radius:7px;padding:11px 16px;cursor:pointer;font-size:13px;
}

/* Ticket log */
.log-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.log-header h2{
  font-family:'Space Grotesk',sans-serif;font-size:14px;letter-spacing:.04em;
  text-transform:uppercase;color:var(--text-dim);margin:0;font-weight:600;
}
.ticket{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:8px;
  overflow:hidden;
}
.ticket-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;
}
.seal{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;
}
.seal.win{background:var(--win);color:#0B0F14;}
.seal.loss{background:var(--loss);color:#0B0F14;}
.seal.be{background:transparent;border:1.5px solid var(--be);color:var(--be);}
.t-main{flex:1;min-width:0;}
.t-pair{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;}
.t-sub{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.t-pnl{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;text-align:right;}
.t-r{font-size:10.5px;color:var(--text-dim);text-align:right;font-family:'JetBrains Mono',monospace;}
.chev{color:var(--text-dim);font-size:11px;transition:transform .15s;flex-shrink:0;}
.ticket.open .chev{transform:rotate(180deg);}

.ticket-detail{
  display:none;
  padding:0 14px 16px;
  border-top:1px dashed var(--border);
}
.ticket.open .ticket-detail{display:block;}
.detail-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin:14px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;
}
.detail-grid div span{display:block;color:var(--text-dim);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.detail-notes{font-size:13px;color:var(--text);line-height:1.5;margin:10px 0;white-space:pre-wrap;}
.detail-tag{
  display:inline-block;background:var(--surface-2);border:1px solid var(--border);
  border-radius:5px;padding:3px 9px;font-size:11px;color:var(--accent);margin-bottom:8px;
}
.detail-shot{max-width:100%;border-radius:8px;border:1px solid var(--border);margin-top:8px;display:block;}
.ticket-actions{display:flex;gap:8px;margin-top:12px;}
.ticket-actions button{
  background:none;border:1px solid var(--border);color:var(--text-dim);
  border-radius:6px;padding:6px 12px;font-size:11.5px;cursor:pointer;
}
.ticket-actions button:hover{color:var(--text);}
.ticket-actions button.del:hover{color:var(--loss);border-color:var(--loss);}

.empty{
  text-align:center;color:var(--text-dim);font-size:13px;padding:40px 20px;
  border:1px dashed var(--border);border-radius:10px;
}
.loading{text-align:center;color:var(--text-dim);font-size:13px;padding:30px;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Funded Account Ledger</p>
  <h1>Trade Log</h1>

  <div class="account-row">
    <div class="account-bal">
      <label>Starting Balance</label>
      <input type="number" id="startBal" placeholder="10000">
    </div>
    <div class="equity-now">
      <div class="label">Current Equity</div>
      <div class="val" id="equityVal">$0.00</div>
    </div>
  </div>

  <div class="stats" id="statsRow"></div>

  <button class="log-btn" id="toggleFormBtn">+ Log Trade</button>

  <div class="form-panel" id="formPanel">
    <p class="form-title" id="formTitle">New Trade</p>
    <p class="form-sub">Fill what you have — only pair, direction, entry, exit, size and P&L are required.</p>

    <div class="grid g3">
      <div class="field"><label>Date</label><input type="date" id="f_date"></div>
      <div class="field"><label>Pair / Instrument</label><input type="text" id="f_pair" placeholder="EURUSD, NAS100..."></div>
      <div class="field"><label>Direction</label>
        <div class="dir-toggle">
          <button type="button" id="dirLong">LONG</button>
          <button type="button" id="dirShort">SHORT</button>
        </div>
      </div>
    </div>

    <div class="section-divider">Prices &amp; Size</div>
    <div class="grid g3">
      <div class="field"><label>Entry</label><input type="number" step="any" id="f_entry"></div>
      <div class="field"><label>Exit</label><input type="number" step="any" id="f_exit"></div>
      <div class="field"><label>Size (lots/units)</label><input type="number" step="any" id="f_size"></div>
    </div>

    <div class="section-divider">Risk</div>
    <div class="grid g3">
      <div class="field"><label>Stop Loss</label><input type="number" step="any" id="f_sl"></div>
      <div class="field"><label>Take Profit</label><input type="number" step="any" id="f_tp"></div>
      <div class="field"><label>$ Risked</label><input type="number" step="any" id="f_risk"></div>
    </div>

    <div class="section-divider">Result</div>
    <div class="grid">
      <div class="field"><label>P&amp;L ($)</label><input type="number" step="any" id="f_pnl"></div>
      <div class="field"><label>Setup / Tag</label><input type="text" id="f_setup" placeholder="Breakout, Pullback, News..."></div>
    </div>

    <div class="section-divider">Review</div>
    <div class="field full">
      <label>Notes</label>
      <textarea id="f_notes" placeholder="Why you took it, how you managed it, lesson learned..."></textarea>
    </div>
    <div class="field full" style="margin-top:12px;">
      <label>Screenshot (optional)</label>
      <div class="shot-row">
        <input type="file" id="f_shot" accept="image/*">
        <img id="shotPreview" class="shot-preview" style="display:none;">
        <button type="button" class="shot-remove" id="shotRemove" style="display:none;">Remove</button>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-save" id="saveBtn">Save Trade</button>
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
    </div>
  </div>

  <div class="log-header"><h2>History</h2></div>
  <div id="logList"><div class="loading">Loading trades…</div></div>
</div>

<script>
let trades = [];
let accountSettings = { startBal: 0 };
let editingId = null;
let pendingShot = null;
let direction = null;
let ready = false;

const STORAGE_KEY = 'trades-data';
const SETTINGS_KEY = 'account-settings';

async function loadAll(){
  try{
    const t = await window.storage.get(STORAGE_KEY, false);
    trades = t ? JSON.parse(t.value) : [];
  }catch(e){ trades = []; }
  try{
    const s = await window.storage.get(SETTINGS_KEY, false);
    accountSettings = s ? JSON.parse(s.value) : { startBal: 0 };
  }catch(e){ accountSettings = { startBal: 0 }; }
  document.getElementById('startBal').value = accountSettings.startBal || '';
  ready = true;
  renderAll();
}

async function saveTrades(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(trades), false); }
  catch(e){ console.error('save failed', e); }
}
async function saveSettings(){
  try{ await window.storage.set(SETTINGS_KEY, JSON.stringify(accountSettings), false); }
  catch(e){ console.error('save failed', e); }
}

document.getElementById('startBal').addEventListener('change', e=>{
  accountSettings.startBal = parseFloat(e.target.value) || 0;
  saveSettings();
  renderAll();
});

function computeTrade(tr){
  const entry = parseFloat(tr.entry), sl = parseFloat(tr.sl), tp = parseFloat(tr.tp);
  let plannedRR = null;
  if(!isNaN(entry) && !isNaN(sl) && !isNaN(tp)){
    let rewardDist, riskDist;
    if(tr.direction === 'short'){ rewardDist = entry - tp; riskDist = sl - entry; }
    else { rewardDist = tp - entry; riskDist = entry - sl; }
    if(riskDist > 0) plannedRR = rewardDist / riskDist;
  }
  const pnl = parseFloat(tr.pnl) || 0;
  const risk = parseFloat(tr.risk);
  const realizedR = (!isNaN(risk) && risk > 0) ? (pnl / risk) : null;
  const outcome = pnl > 0 ? 'win' : pnl < 0 ? 'loss' : 'be';
  return { plannedRR, realizedR, outcome, pnl };
}

function computeStats(){
  const startBal = accountSettings.startBal || 0;
  const sorted = [...trades].sort((a,b)=> new Date(a.date) - new Date(b.date));
  let equity = startBal, peak = startBal, maxDD = 0;
  let wins = 0, grossWin = 0, grossLoss = 0, rSum = 0, rCount = 0;
  sorted.forEach(tr=>{
    const c = computeTrade(tr);
    equity += c.pnl;
    if(equity > peak) peak = equity;
    const dd = peak > 0 ? ((peak - equity) / peak) * 100 : 0;
    if(dd > maxDD) maxDD = dd;
    if(c.pnl > 0){ wins++; grossWin += c.pnl; }
    if(c.pnl < 0){ grossLoss += Math.abs(c.pnl); }
    if(c.realizedR !== null){ rSum += c.realizedR; rCount++; }
  });
  const total = trades.length;
  const totalPnL = equity - startBal;
  return {
    equity, totalPnL, total,
    winRate: total ? (wins/total*100) : 0,
    avgR: rCount ? (rSum/rCount) : null,
    profitFactor: grossLoss > 0 ? (grossWin/grossLoss) : (grossWin > 0 ? Infinity : 0),
    maxDD
  };
}

function fmtMoney(n){
  const s = n < 0 ? '-$' : '$';
  return s + Math.abs(n).toFixed(2);
}

function renderStats(){
  const s = computeStats();
  document.getElementById('equityVal').textContent = fmtMoney(s.equity);
  document.getElementById('equityVal').className = 'val ' + (s.totalPnL >= 0 ? 'pos' : 'neg');

  const pf = s.profitFactor === Infinity ? '∞' : s.profitFactor.toFixed(2);
  const avgR = s.avgR === null ? '—' : (s.avgR>=0?'+':'') + s.avgR.toFixed(2) + 'R';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="n">${s.total}</div><div class="l">Trades</div></div>
    <div class="stat"><div class="n">${s.winRate.toFixed(0)}%</div><div class="l">Win Rate</div></div>
    <div class="stat"><div class="n">${avgR}</div><div class="l">Avg R</div></div>
    <div class="stat"><div class="n">${pf}</div><div class="l">Profit Factor</div></div>
    <div class="stat"><div class="n neg">-${s.maxDD.toFixed(1)}%</div><div class="l">Max Drawdown</div></div>
    <div class="stat"><div class="n ${s.totalPnL>=0?'pos':'neg'}">${fmtMoney(s.totalPnL)}</div><div class="l">Total P&amp;L</div></div>
  `;
}

function renderLog(){
  const list = document.getElementById('logList');
  if(!trades.length){
    list.innerHTML = '<div class="empty">No trades logged yet. Tap "+ Log Trade" to add your first one.</div>';
    return;
  }
  const sorted = [...trades].sort((a,b)=> new Date(b.date) - new Date(a.date) || b.createdAt - a.createdAt);
  list.innerHTML = sorted.map(tr=>{
    const c = computeTrade(tr);
    const rTxt = c.realizedR !== null ? (c.realizedR>=0?'+':'') + c.realizedR.toFixed(2) + 'R' :
                 (c.plannedRR !== null ? 'plan ' + c.plannedRR.toFixed(2)+'R' : '—');
    const detailGrid = [
      ['Entry', tr.entry ?? '—'],
      ['Exit', tr.exit ?? '—'],
      ['Size', tr.size ?? '—'],
      ['Stop Loss', tr.sl ?? '—'],
      ['Take Profit', tr.tp ?? '—'],
      ['$ Risked', tr.risk ?? '—'],
    ].map(([k,v])=>`<div><span>${k}</span>${v}</div>`).join('');
    return `
    <div class="ticket" id="ticket-${tr.id}">
      <div class="ticket-row" onclick="toggleTicket('${tr.id}')">
        <div class="seal ${c.outcome}">${c.outcome==='win'?'W':c.outcome==='loss'?'L':'BE'}</div>
        <div class="t-main">
          <div class="t-pair">${escapeHtml(tr.pair||'—')} <span style="color:var(--text-dim);font-weight:400;font-size:11px;">${tr.direction==='short'?'SHORT':'LONG'}</span></div>
          <div class="t-sub">${tr.date||''}</div>
        </div>
        <div>
          <div class="t-pnl ${c.pnl>=0?'pos':'neg'}">${fmtMoney(c.pnl)}</div>
          <div class="t-r">${rTxt}</div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="ticket-detail">
        <div class="detail-grid">${detailGrid}</div>
        ${tr.setup ? `<div class="detail-tag">${escapeHtml(tr.setup)}</div>` : ''}
        ${tr.notes ? `<div class="detail-notes">${escapeHtml(tr.notes)}</div>` : ''}
        ${tr.screenshot ? `<img src="${tr.screenshot}" class="detail-shot">` : ''}
        <div class="ticket-actions">
          <button onclick="editTrade('${tr.id}', event)">Edit</button>
          <button class="del" onclick="deleteTrade('${tr.id}', event)">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleTicket(id){
  document.getElementById('ticket-'+id).classList.toggle('open');
}

function renderAll(){
  if(!ready) return;
  renderStats();
  renderLog();
}

/* Form handling */
const formPanel = document.getElementById('formPanel');
const toggleFormBtn = document.getElementById('toggleFormBtn');

toggleFormBtn.addEventListener('click', ()=>{
  if(formPanel.classList.contains('open')){
    closeForm();
  } else {
    resetForm();
    formPanel.classList.add('open');
    toggleFormBtn.textContent = '– Close';
  }
});

document.getElementById('cancelBtn').addEventListener('click', closeForm);

function closeForm(){
  formPanel.classList.remove('open');
  toggleFormBtn.textContent = '+ Log Trade';
  resetForm();
}

function resetForm(){
  editingId = null;
  pendingShot = null;
  direction = null;
  document.getElementById('formTitle').textContent = 'New Trade';
  document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
  ['f_pair','f_entry','f_exit','f_size','f_sl','f_tp','f_risk','f_pnl','f_setup','f_notes'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  document.getElementById('f_shot').value = '';
  document.getElementById('shotPreview').style.display = 'none';
  document.getElementById('shotRemove').style.display = 'none';
  setDirection(null);
}

function setDirection(dir){
  direction = dir;
  const longBtn = document.getElementById('dirLong');
  const shortBtn = document.getElementById('dirShort');
  longBtn.classList.toggle('active-long', dir==='long');
  shortBtn.classList.toggle('active-short', dir==='short');
}
document.getElementById('dirLong').addEventListener('click', ()=> setDirection('long'));
document.getElementById('dirShort').addEventListener('click', ()=> setDirection('short'));

document.getElementById('f_shot').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      pendingShot = canvas.toDataURL('image/jpeg', 0.7);
      const prev = document.getElementById('shotPreview');
      prev.src = pendingShot;
      prev.style.display = 'block';
      document.getElementById('shotRemove').style.display = 'inline-block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
document.getElementById('shotRemove').addEventListener('click', ()=>{
  pendingShot = null;
  document.getElementById('f_shot').value = '';
  document.getElementById('shotPreview').style.display = 'none';
  document.getElementById('shotRemove').style.display = 'none';
});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const pair = document.getElementById('f_pair').value.trim();
  const entry = document.getElementById('f_entry').value;
  const exit = document.getElementById('f_exit').value;
  const size = document.getElementById('f_size').value;
  const pnl = document.getElementById('f_pnl').value;

  if(!pair || !direction || entry==='' || exit==='' || size==='' || pnl===''){
    alert('Please fill pair, direction, entry, exit, size and P&L.');
    return;
  }

  const trade = {
    id: editingId || (Date.now().toString(36) + Math.random().toString(36).slice(2,7)),
    date: document.getElementById('f_date').value || new Date().toISOString().slice(0,10),
    pair,
    direction,
    entry, exit, size,
    sl: document.getElementById('f_sl').value,
    tp: document.getElementById('f_tp').value,
    risk: document.getElementById('f_risk').value,
    pnl,
    setup: document.getElementById('f_setup').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    screenshot: pendingShot,
    createdAt: editingId ? (trades.find(t=>t.id===editingId)||{}).createdAt || Date.now() : Date.now()
  };

  if(editingId){
    trades = trades.map(t => t.id === editingId ? trade : t);
  } else {
    trades.push(trade);
  }
  await saveTrades();
  closeForm();
  renderAll();
});

window.editTrade = function(id, ev){
  if(ev) ev.stopPropagation();
  const tr = trades.find(t=>t.id===id);
  if(!tr) return;
  editingId = id;
  pendingShot = tr.screenshot || null;
  document.getElementById('formTitle').textContent = 'Edit Trade';
  document.getElementById('f_date').value = tr.date || '';
  document.getElementById('f_pair').value = tr.pair || '';
  document.getElementById('f_entry').value = tr.entry || '';
  document.getElementById('f_exit').value = tr.exit || '';
  document.getElementById('f_size').value = tr.size || '';
  document.getElementById('f_sl').value = tr.sl || '';
  document.getElementById('f_tp').value = tr.tp || '';
  document.getElementById('f_risk').value = tr.risk || '';
  document.getElementById('f_pnl').value = tr.pnl || '';
  document.getElementById('f_setup').value = tr.setup || '';
  document.getElementById('f_notes').value = tr.notes || '';
  setDirection(tr.direction);
  if(tr.screenshot){
    const prev = document.getElementById('shotPreview');
    prev.src = tr.screenshot;
    prev.style.display = 'block';
    document.getElementById('shotRemove').style.display = 'inline-block';
  }
  formPanel.classList.add('open');
  toggleFormBtn.textContent = '– Close';
  formPanel.scrollIntoView({behavior:'smooth', block:'start'});
};

window.deleteTrade = async function(id, ev){
  if(ev) ev.stopPropagation();
  if(!confirm('Delete this trade?')) return;
  trades = trades.filter(t=>t.id!==id);
  await saveTrades();
  renderAll();
};

window.toggleTicket = toggleTicket;

loadAll();
</script>
</body>
</html>
